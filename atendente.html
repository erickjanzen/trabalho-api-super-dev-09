<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Atendente</title>
    <link rel="stylesheet" href="assets/css/atendente.css">
</head>

<body>

    <div class="area-atendente">

        <h1 class="titulo-atendente">Área do Atendente</h1>

        <div class="informacoes-cliente">

            <div class="campo-info">
                <span class="label-info">Cliente:</span>
                <div class="texto-info" id="nomeCliente"></div>
            </div>

            <div class="campo-info">
                <span class="label-info">Produto:</span>
                <div class="texto-info" id="produtoCliente"></div>
            </div>

            <div class="campo-info">
                <span class="label-info">Valor:</span>
                <div class="texto-info" id="valorCliente"></div>
            </div>

            <div class="campo-info">
                <span class="label-info">Horário:</span>
                <div class="texto-info" id="horarioCliente"></div>
            </div>

        </div>

        <div class="feedback-cliente">

            <h2>Avaliação do Cliente</h2>

            <div class="avaliacao">
                <input type="radio" name="feedback" value="1">1
                <input type="radio" name="feedback" value="2">2
                <input type="radio" name="feedback" value="3">3
                <input type="radio" name="feedback" value="4">4
                <input type="radio" name="feedback" value="5">5
            </div>

        </div>

        <button class="btn-enviar">
            Enviar Avaliação
        </button>

    </div>
    <script src="assets/js/atendente.js"></script>
</body>

</html>
